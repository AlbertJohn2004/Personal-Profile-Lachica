<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>Personal Profile - John Albert C. Lachica</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html"></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html" class="active">About</a>
        <a href="certificates.html">Certificates</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme">?</button>
    </header>

    <main class="page-shell">
        <div class="profile-card">
            <div class="avatar-container" id="avatar-target">
                <div class="avatar-fallback">JL</div>
            </div>

            <h1>John Albert C. Lachica</h1>
            <div class="name-underline" aria-hidden="true"></div>
            <div class="title">Aspiring Developer / Student</div>

            <p class="bio" id="bio-target">
                Welcome to my personal profile page! Loading fresh insights...
            </p>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val" id="repo-count">-</span>
                    <span class="stat-label">Repositories</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="followers-count">-</span>
                    <span class="stat-label">Followers</span>
                </div>
            </div>

 

            <div class="divider" aria-hidden="true"></div>

            <div class="links">
                <a href="https://github.com/AlbertJohn2004" target="_blank">View GitHub </a>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_USERNAME = 'AlbertJohn2004';

        async function fetchGitHubData() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
                if (!response.ok) throw new Error('Network error fetching profile data');

                const data = await response.json();

                if(data.avatar_url) {
                    document.getElementById('avatar-target').innerHTML = `
                        <img src="${data.avatar_url}" alt="John Albert" class="avatar">
                    `;
                }

                if(data.bio) {
                    document.getElementById('bio-target').textContent = data.bio;
                } else {
                    document.getElementById('bio-target').textContent = "Welcome to my personal profile page! Check out my work below.";
                }

                document.getElementById('repo-count').textContent = data.public_repos;
                document.getElementById('followers-count').textContent = data.followers;

            } catch (error) {
                console.error('Error binding cloud API data:', error);
                document.getElementById('repo-count').textContent = "4";
                document.getElementById('followers-count').textContent = "0";
            }
        }

        document.addEventListener('DOMContentLoaded', fetchGitHubData);
    </script>
</body>
</html>
