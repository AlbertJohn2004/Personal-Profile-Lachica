<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 100%;
            padding: 32px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #9333ea);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        .title {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 24px;
        }

        .bio {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .badge {
            background-color: #eff6ff;
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">AI</div>
        
        <h1>John Albert C. Lachica</h1>
        <div class="title">Aspiring Developer / Student</div>
        
        <p class="bio">
            Welcome to my personal profile page! This page was created using AI assistance, 
            version-controlled with Git, and hosted securely via GitHub Pages to fulfill my assignment rubric.
        </p>

        <div class="skills">
            <span class="badge">Git & GitHub</span>
            <span class="badge">HTML5</span>
            <span class="badge">CSS3</span>
            <span class="badge">AI Prompting</span>
        </div>

        <div class="links">
            <a href="https://github.com" target="_blank">View GitHub Portfolio</a>
        </div>
    </div>

</body>
</html>
